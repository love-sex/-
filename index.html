<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>待办事项管理</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- ========== 登录/注册页面 ========== -->
    <div class="auth-container" id="authContainer">
        <div class="auth-box">
            <div class="auth-header">
                <div class="auth-logo">📋</div>
                <h1>待办事项</h1>
                <p>高效管理您的任务</p>
            </div>

            <!-- 登录表单 -->
            <form class="auth-form" id="loginForm">
                <div class="form-group">
                    <label for="loginUsername">👤 用户名</label>
                    <input type="text" id="loginUsername" placeholder="请输入用户名" required minlength="2" maxlength="20">
                </div>
                <div class="form-group">
                    <label for="loginPassword">🔒 密码</label>
                    <input type="password" id="loginPassword" placeholder="请输入密码" required minlength="6">
                </div>
                <button type="submit" class="auth-btn login-btn">登 录</button>
                <div class="auth-switch">
                    还没有账号？<a href="#" id="showRegister">立即注册</a>
                </div>
            </form>

            <!-- 注册表单 -->
            <form class="auth-form hidden" id="registerForm">
                <div class="form-group">
                    <label for="regUsername">👤 用户名</label>
                    <input type="text" id="regUsername" placeholder="2-20个字符" required minlength="2" maxlength="20">
                </div>
                <div class="form-group">
                    <label for="regPassword">🔒 密码</label>
                    <input type="password" id="regPassword" placeholder="至少6位密码" required minlength="6">
                </div>
                <div class="form-group">
                    <label for="regPasswordConfirm">🔒 确认密码</label>
                    <input type="password" id="regPasswordConfirm" placeholder="再次输入密码" required minlength="6">
                </div>
                <button type="submit" class="auth-btn register-btn">注 册</button>
                <div class="auth-switch">
                    已有账号？<a href="#" id="showLogin">立即登录</a>
                </div>
            </form>

            <div class="auth-error" id="authError"></div>
        </div>
    </div>

    <!-- ========== 主应用页面 ========== -->
    <div class="container hidden" id="mainApp">
        <header>
            <div class="header-content">
                <div>
                    <h1>📋 待办事项</h1>
                    <p class="subtitle">高效管理您的任务</p>
                </div>
                <div class="user-info">
                    <span class="user-greeting">👋 你好，<strong id="currentUsername">用户</strong></span>
                    <button class="logout-btn" id="logoutBtn">退出登录</button>
                </div>
            </div>
        </header>

        <div class="input-section">
            <div class="input-group">
                <input type="text" id="taskInput" placeholder="输入新的待办事项...">
                <select id="prioritySelect">
                    <option value="low">🔽 低优先级</option>
                    <option value="medium" selected>⚪ 中优先级</option>
                    <option value="high">🔺 高优先级</option>
                </select>
                <select id="categorySelect">
                    <option value="默认">📁 默认分类</option>
                </select>
                <input type="date" id="dueDateInput">
                <button id="addTaskBtn">添加任务</button>
            </div>
        </div>

        <div class="filter-section">
            <div class="filter-group">
                <button class="filter-btn active" data-filter="all">全部</button>
                <button class="filter-btn" data-filter="pending">待完成</button>
                <button class="filter-btn" data-filter="completed">已完成</button>
                <select id="filterCategory">
                    <option value="all">所有分类</option>
                </select>
                <select id="sortSelect">
                    <option value="date">按日期排序</option>
                    <option value="priority">按优先级排序</option>
                    <option value="name">按名称排序</option>
                </select>
            </div>
        </div>

        <div class="stats-section">
            <div class="stat-item">
                <div class="stat-number" id="totalTasks">0</div>
                <div class="stat-label">📊 总任务</div>
            </div>
            <div class="stat-item">
                <div class="stat-number" id="pendingTasks">0</div>
                <div class="stat-label">⏳ 待完成</div>
            </div>
            <div class="stat-item">
                <div class="stat-number" id="completedTasks">0</div>
                <div class="stat-label">✅ 已完成</div>
            </div>
            <div class="stat-item">
                <div class="stat-number" id="completionRate">0%</div>
                <div class="stat-label">🎯 完成率</div>
            </div>
        </div>

        <div class="category-section">
            <h3>任务分类</h3>
            <div class="category-list" id="categoryList">
                <span class="category-tag active" data-category="all">全部</span>
            </div>
            <div class="category-input-group">
                <input type="text" id="categoryInput" placeholder="添加新分类...">
                <button id="addCategoryBtn">添加</button>
            </div>
        </div>

        <div class="task-list" id="taskList">
            <!-- 任务动态添加到这里 -->
        </div>
        <div class="empty-state" id="emptyState">
            <div class="empty-icon">📝</div>
            <p>暂无待办事项</p>
            <p class="empty-hint">添加您的第一个任务吧！</p>
        </div>

        <div class="action-buttons">
            <button id="selectAllBtn" class="secondary-btn">全选</button>
            <button id="deleteSelectedBtn" class="secondary-btn danger-btn">删除选中</button>
            <button id="clearCompletedBtn" class="secondary-btn">清空已完成</button>
            <button id="exportBtn" class="secondary-btn">导出数据</button>
            <button id="importBtn" class="secondary-btn">
                <input type="file" id="fileInput" accept=".json" style="display: none;">
                导入数据
            </button>
        </div>
    </div>

    <div class="notification" id="notification"></div>

    <script src="script.js"></script>
</body>
</html>
